<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ليكِ يا ياسمين</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose: #c9184a;
    --rose-light: #ff4d6d;
    --rose-pale: #fff0f3;
    --rose-mid: #ffb3c1;
    --gold: #d4a853;
    --dark: #1a0a0f;
    --petal: #ffe0e9;
  }

  body {
    min-height: 100vh;
    background: var(--dark);
    font-family: 'Cairo', sans-serif;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Starfield */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: 0.1; transform: scale(0.8); }
    to   { opacity: 0.9; transform: scale(1.2); }
  }

  /* Floating petals */
  .petal {
    position: fixed;
    width: 10px; height: 14px;
    background: var(--rose-mid);
    border-radius: 50% 0 50% 0;
    opacity: 0;
    pointer-events: none;
    animation: fall var(--fd) linear var(--fd2) infinite;
    z-index: 1;
  }
  @keyframes fall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 0.7; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }

  /* Screens */
  .screen {
    position: relative;
    z-index: 10;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 30px;
    max-width: 520px;
    width: 90%;
    animation: fadeIn 1.2s ease forwards;
  }
  .screen.active { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Card */
  .card {
    background: rgba(255,240,243,0.04);
    border: 1px solid rgba(201,24,74,0.3);
    border-radius: 24px;
    padding: 50px 40px;
    backdrop-filter: blur(12px);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(201,24,74,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Decorative corners */
  .corner {
    position: absolute;
    width: 40px; height: 40px;
    border-color: var(--gold);
    border-style: solid;
    opacity: 0.5;
  }
  .corner.tl { top: 12px; left: 12px; border-width: 1px 0 0 1px; }
  .corner.tr { top: 12px; right: 12px; border-width: 1px 1px 0 0; }
  .corner.bl { bottom: 12px; left: 12px; border-width: 0 0 1px 1px; }
  .corner.br { bottom: 12px; right: 12px; border-width: 0 1px 1px 0; }

  .big-heart {
    font-size: 56px;
    animation: heartbeat 1.4s ease-in-out infinite;
    display: block;
    margin-bottom: 20px;
  }
  @keyframes heartbeat {
    0%,100% { transform: scale(1); }
    14%      { transform: scale(1.18); }
    28%      { transform: scale(1); }
    42%      { transform: scale(1.1); }
    70%      { transform: scale(1); }
  }

  h1 {
    font-family: 'Amiri', serif;
    font-size: 2rem;
    color: var(--rose-light);
    line-height: 1.5;
    margin-bottom: 10px;
  }
  .sub {
    font-size: 0.95rem;
    color: var(--rose-mid);
    opacity: 0.75;
    margin-bottom: 32px;
    letter-spacing: 1px;
  }

  /* Button */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, var(--rose) 0%, #a4133c 100%);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 14px 36px;
    font-family: 'Cairo', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.5px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 6px 30px rgba(201,24,74,0.4);
  }
  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.12);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(201,24,74,0.55); }
  .btn:hover::after { opacity: 1; }
  .btn:active { transform: translateY(0); }

  /* Message text */
  .msg {
    font-family: 'Amiri', serif;
    font-size: 1.25rem;
    color: #ffe8ee;
    line-height: 2;
    margin-bottom: 28px;
  }
  .msg span {
    color: var(--rose-light);
    font-weight: 700;
  }

  .divider {
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 20px auto;
  }

  .hearts-row {
    font-size: 1.4rem;
    letter-spacing: 8px;
    margin-bottom: 24px;
  }

  /* Final screen seal */
  .seal {
    width: 80px; height: 80px;
    border: 2px solid var(--gold);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem;
    margin: 0 auto 20px;
    animation: rotateSeal 8s linear infinite;
    opacity: 0.85;
  }
  @keyframes rotateSeal {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* Burst hearts on click */
  .burst-heart {
    position: fixed;
    font-size: 1.5rem;
    pointer-events: none;
    z-index: 999;
    animation: burstUp 1s ease forwards;
  }
  @keyframes burstUp {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-120px) scale(0.5); }
  }

</style>
</head>
<body>

<!-- Stars -->
<div class="stars" id="stars"></div>

<!-- Petals -->
<div id="petals"></div>

<!-- SCREEN 1: Intro -->
<div class="screen active" id="s1">
  <div class="card">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <span class="big-heart">💌</span>
    <h1>اضغطي هنا يا قمر</h1>
    <p class="sub">في حاجة عايزك تعرفيها ✨</p>
    <button class="btn" onclick="goTo('s2'); burst(event)">
      ❤️ &nbsp; اضغطي هنا
    </button>
  </div>
</div>

<!-- SCREEN 2: First message -->
<div class="screen" id="s2">
  <div class="card">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <span class="big-heart">❤️</span>
    <p class="msg">
      أوعي تزعلي مني يا ياسمين<br>
      <span>انتِ عارفة إنك غالية</span><br>
      وأغلى حد في حياتي 🌹
    </p>
    <div class="divider"></div>
    <button class="btn" onclick="goTo('s3'); burst(event)">
      التالي &nbsp; 💫
    </button>
  </div>
</div>

<!-- SCREEN 3: Promise -->
<div class="screen" id="s3">
  <div class="card">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div class="seal">🤍</div>
    <p class="msg">
      <span>وعد مني</span><br>
      أنا ما هنساكِ<br>
      وإنك هتفضلي جنبي دايماً 🕊️
    </p>
    <div class="divider"></div>
    <button class="btn" onclick="goTo('s4'); burst(event)">
      التالي &nbsp; 🌸
    </button>
  </div>
</div>

<!-- SCREEN 4: Final -->
<div class="screen" id="s4">
  <div class="card">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <span class="big-heart">💍</span>
    <h1>والله</h1>
    <p class="msg">
      اليوم اللي هيبقى معايا<br>
      <span>ما هحرمكِ من حاجة</span><br>
      أبداً يا ياسمين 💕
    </p>
    <div class="divider"></div>
    <div class="hearts-row">❤️ 💗 💖 💗 ❤️</div>
    <p style="color: var(--gold); font-family: 'Amiri',serif; font-size:1rem; opacity:0.8;">~ بحبك ~ 🌹</p>
  </div>
</div>

<script>
// Stars
const starsEl = document.getElementById('stars');
for (let i = 0; i < 120; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2.5 + 0.5;
  s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*3+1.5).toFixed(1)}s;animation-delay:${(Math.random()*3).toFixed(1)}s`;
  starsEl.appendChild(s);
}

// Petals
const petalsEl = document.getElementById('petals');
for (let i = 0; i < 18; i++) {
  const p = document.createElement('div');
  p.className = 'petal';
  p.style.cssText = `left:${Math.random()*100}%;--fd:${(Math.random()*8+6).toFixed(1)}s;--fd2:${(Math.random()*6).toFixed(1)}s`;
  petalsEl.appendChild(p);
}

// Navigation
function goTo(id) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active');
    s.style.display = 'none';
  });
  const el = document.getElementById(id);
  el.style.display = 'flex';
  // force reflow for animation
  void el.offsetWidth;
  el.classList.add('active');
}

// Burst hearts on click
function burst(e) {
  const emojis = ['❤️','💗','💖','🌸','✨','💕'];
  for (let i = 0; i < 8; i++) {
    const h = document.createElement('div');
    h.className = 'burst-heart';
    h.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    h.style.left = (e.clientX + (Math.random()-0.5)*80) + 'px';
    h.style.top  = (e.clientY + (Math.random()-0.5)*40) + 'px';
    h.style.animationDelay = (Math.random()*0.3) + 's';
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 1200);
  }
}
</script>
</body>
</html>
