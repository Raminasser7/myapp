<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyApp</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #2a2a3a;
      --accent: #00e5ff;
      --accent2: #7c3aed;
      --text: #e8e8f0;
      --muted: #6b6b80;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.35;
      z-index: 0;
    }

    .glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,229,255,0.07) 0%, transparent 70%);
      top: -100px;
      left: -100px;
      pointer-events: none;
      z-index: 0;
    }
    .glow2 {
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,58,237,0.07) 0%, transparent 70%);
      bottom: -80px;
      right: -80px;
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 56px;
      width: min(520px, 92vw);
      box-shadow: 0 0 60px rgba(0,229,255,0.05), 0 24px 48px rgba(0,0,0,0.5);
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      background: rgba(0,229,255,0.08);
      border: 1px solid rgba(0,229,255,0.2);
      border-radius: 20px;
      padding: 4px 12px;
      margin-bottom: 28px;
      letter-spacing: 0.08em;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    h1 {
      font-size: 2.6rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 10px;
    }

    h1 span {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 36px;
      font-weight: 400;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 28px;
    }

    .info-grid {
      display: grid;
      gap: 16px;
      margin-bottom: 36px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .info-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .info-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--text);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
    }

    .version-value {
      color: var(--accent);
      border-color: rgba(0,229,255,0.2);
      background: rgba(0,229,255,0.06);
    }

    .footer {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="glow2"></div>

  <div class="card">
    <div class="badge">
      <span class="dot"></span>
      LIVE · KUBERNETES
    </div>

    <h1>My<span>App</span></h1>
    <p class="subtitle">Jenkins CI/CD Pipeline — Minikube Demo</p>

    <div class="divider"></div>

    <div class="info-grid">
      <div class="info-row">
        <span class="info-label">Version</span>
        <span class="info-value version-value">v1.0.0</span>
      </div>
      <div class="info-row">
        <span class="info-label">Environment</span>
        <span class="info-value">production</span>
      </div>
      <div class="info-row">
        <span class="info-label">Last Deploy</span>
        <span class="info-value">2026-06-04 00:00</span>
      </div>
      <div class="info-row">
        <span class="info-label">Author</span>
        <span class="info-value">Rami</span>
      </div>
    </div>

    <div class="footer">
      PUSH TO GITHUB → JENKINS BUILDS → POD UPDATES
    </div>
  </div>
</body>
</html>
